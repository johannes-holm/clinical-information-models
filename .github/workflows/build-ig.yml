name: Build and Deploy IG

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Ruby and Jekyll
        run: |
          sudo gem install jekyll

      - name: Install SUSHI
        run: npm install -g fsh-sushi
        
      
      - name: Install Mermaid CLI
        run: |
          npm install -g @mermaid-js/mermaid-cli
          # Puppeteer needs these on Ubuntu
          sudo apt-get update
          sudo apt-get install -y \
            chromium-browser \
            libgbm-dev \
            libnss3 \
            libatk-bridge2.0-0 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2t64
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Cache IG Publisher
        uses: actions/cache@v4
        with:
          path: input-cache/publisher.jar
          key: ig-publisher-latest

      - name: Download IG Publisher
        run: |
          if [ ! -f input-cache/publisher.jar ]; then
            mkdir -p input-cache
            curl -L https://github.com/HL7/fhir-ig-publisher/releases/latest/download/publisher.jar \
              -o input-cache/publisher.jar
          fi

      # ── Build Pipeline ─────────────────────────
      - name: Step 1 - SUSHI (discover models)
        run: sushi .

      - name: Step 2 - Generate pages and config
        run: python scripts/generate_pages.py

      - name: Step 3 - Re-run SUSHI (updated config)
        run: sushi .

      - name: Step 4 - Generate diagrams and tables
        run: |
          python scripts/generate_mermaid.py
          python scripts/generate_table.py

      - name: Step 5 - Render Mermaid SVGs
        run: |
          export PUPPETEER_EXECUTABLE_PATH=$(which chromium-browser)
          mkdir -p input/images/generated
          for mmd in input/images/generated/*.mmd; do
            if [ -f "$mmd" ]; then
              svg="${mmd%.mmd}.svg"
              echo "Rendering: $mmd -> $svg"
              mmdc -i "$mmd" -o "$svg" -t neutral --quiet \
                -p /dev/stdin <<< '{"executablePath":"'$PUPPETEER_EXECUTABLE_PATH'"}'
            fi
          done

      - name: Step 6 - IG Publisher
        run: |
          java -jar input-cache/publisher.jar publisher -ig .

      # ── Deploy ─────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './output'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4